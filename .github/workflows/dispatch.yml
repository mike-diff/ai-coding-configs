name: Claude Dispatch
# Run /dev in unattended mode when an issue is labeled 'dispatch'.
# Rationale, one-time setup (Claude GitHub App + CLAUDE_CODE_OAUTH_TOKEN), and the
# constraints behind each input below are documented in the single source of truth:
#   .claude/skills/dev/references/unattended-ci.md
on:
  issues:
    types: [labeled]

concurrency:
  group: dispatch-${{ github.event.issue.number }}
  cancel-in-progress: false     # let an in-flight run finish; don't kill mid-build

jobs:
  dispatch:
    if: github.event.label.name == 'dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 45          # wall-clock backstop — the only hard stop for a hung sub-agent
    permissions:
      contents: write            # create the claude/issue-<n> branch + commit
      issues: write              # read the issue body, post status back
      pull-requests: write       # surface the PR
      id-token: write            # required even for OAuth — see ci-overrides.md
      actions: read
    steps:
      - uses: actions/checkout@v4   # loads .claude/skills/dev + .claude/agents headless
      - id: claude                  # expose branch_name output for the auto-PR step
        uses: anthropics/claude-code-action@v1
        env:
          DEV_UNATTENDED: "1"        # signals /dev to suspend its human-input gates
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Imperative invocation (a bare "/dev" gets described, not run).
          prompt: |
            Invoke /dev in unattended mode now and implement this GitHub issue end-to-end.
            Do not just describe it — execute it: delegate to the explorer/implementer/
            reviewer/qa sub-agents via the Task tool, run the build loop with the review
            and QA gates, and commit the result.

            Before finishing, write a file `PR_BODY.md` at the repo root with the pull
            request description: a short summary of what changed and why, the key changes
            (bulleted), how it was verified (tests/validators run + results), any
            assumptions made, and a final line `Closes #${{ github.event.issue.number }}`.
            Write it as the PR description a reviewer should read — not a transcript.

            Issue title: ${{ github.event.issue.title }}

            Issue body:
            ${{ github.event.issue.body }}
          # --model sets only the lead; sub-agents keep their model: frontmatter.
          # --allowedTools is required to spawn sub-agents in tag mode. See unattended-ci.md.
          # --dangerously-skip-permissions: required to write under .claude/ — Claude Code
          #   guards its own config dir and normal allow-rules/acceptEdits do NOT override it
          #   (verified). Acceptable here: the runner is an ephemeral sandbox, the unattended
          #   contract still halts on destructive/irreversible ops, and --allowedTools bounds
          #   the toolset. Without it, .claude/-targeting issues return `blocked`. See unattended-ci.md.
          claude_args: >-
            --model opus
            --max-turns 60
            --max-budget-usd 15
            --allowedTools Task,Bash,Read,Write,Edit,Grep,Glob
            --dangerously-skip-permissions
          branch_prefix: "claude/"   # action appends issue-<n>; avoids doubled name
          track_progress: true

      # Auto-open the PR. Tag mode (issues event) pushes the branch but does NOT open a PR
      # itself — it only posts a "Create PR" link. This step opens it automatically.
      - name: Open pull request
        if: ${{ steps.claude.outputs.branch_name != '' && steps.claude.outputs.branch_name != github.event.repository.default_branch }}
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          BASE: ${{ github.event.repository.default_branch }}
          BRANCH: ${{ steps.claude.outputs.branch_name }}
          ISSUE_NUM: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          # Skip if the run made a branch but committed nothing (e.g. a `blocked` result).
          # Use the compare API so we don't depend on local refs from a shallow checkout.
          ahead="$(gh api "repos/${REPO}/compare/${BASE}...${BRANCH}" --jq '.ahead_by')"
          if [ "${ahead:-0}" -eq 0 ]; then
            echo "Branch ${BRANCH} is not ahead of ${BASE}; nothing to PR."
            exit 0
          fi

          # PR body: prefer PR_BODY.md authored by the agent (committed on the branch);
          # fall back to a minimal body if the agent didn't produce one.
          # PR_BODY.md is a description artifact, not a source change — capture its content,
          # then delete it from the branch so it never appears in the PR diff.
          BODY_FILE="$(mktemp)"
          PR_BODY_SHA="$(gh api "repos/${REPO}/contents/PR_BODY.md?ref=${BRANCH}" --jq '.sha' 2>/dev/null || true)"
          if [ -n "$PR_BODY_SHA" ]; then
            echo "Using agent-authored PR_BODY.md."
            gh api "repos/${REPO}/contents/PR_BODY.md?ref=${BRANCH}" \
              -H "Accept: application/vnd.github.raw" > "$BODY_FILE"
            # Remove the artifact from the branch (a single commit deleting just this file).
            gh api -X DELETE "repos/${REPO}/contents/PR_BODY.md" \
              -f message="chore: drop PR_BODY.md (PR description artifact)" \
              -f sha="$PR_BODY_SHA" -f branch="$BRANCH" >/dev/null
            echo "Removed PR_BODY.md from ${BRANCH}."
          else
            printf '%s\n' \
              "Automated by the dispatch workflow. Built by \`/dev --unattended\`." \
              "See the issue and the run for the build's progress and verification." \
              "" \
              "Run: ${RUN_URL}" \
              "" \
              "Closes #${ISSUE_NUM}" > "$BODY_FILE"
          fi

          # Create the PR, or update its body if one already exists (idempotent on re-label).
          gh pr create --repo "$REPO" \
            --base "$BASE" --head "$BRANCH" \
            --title "$ISSUE_TITLE" \
            --body-file "$BODY_FILE" \
          || gh pr edit "$BRANCH" --repo "$REPO" --body-file "$BODY_FILE"
